version: '3.8'

services:
  subtitle-fetcher:
    build: .
    container_name: subtitle-fetcher
    ports:
      - "8765:8765"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - BILIBILI_SESSDATA=${BILIBILI_SESSDATA}
    volumes:
      # Mount cookies file for Bilibili authentication
      - ./cookies.txt:/app/cookies.txt:ro
      # Optional: mount temp directory for audio files
      - /tmp/subtitle-fetcher:/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
